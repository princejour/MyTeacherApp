name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Gradle
        run: |
          curl -L https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -o gradle.zip
          unzip -q gradle.zip -d $RUNNER_TEMP/gradle
          echo "$RUNNER_TEMP/gradle/gradle-9.3.1/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyTeacher-debug-apk
          path: app/build/outputs/apk/debug/*.apk
